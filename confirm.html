<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f7f7f7;
  margin: 0;
  padding: 20px;
  color: #222;
  font-size: 18px;
  line-height: 1.7;
}

h1 {
  font-size: 26px;
  margin-bottom: 16px;
}

.lead {
  background: #ffffff;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

.card {
  background: white;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  box-sizing: border-box;
}

.name {
  font-size: 23px;
  font-weight: bold;
  margin-bottom: 10px;
}

.info {
  font-size: 18px;
  line-height: 1.8;
}

.button {
  display: block;
  box-sizing: border-box;
  width: 100%;
  margin-top: 16px;
  padding: 14px 12px;
  background: #c0392b;
  color: white;
  text-align: center;
  text-decoration: none;
  border-radius: 10px;
  font-size: 18px;
  font-weight: bold;
  border: none;
}

.cancel-button {
  background: #777;
}

.notice {
  font-size: 16px;
  line-height: 1.7;
  color: #555;
  margin-top: 14px;
}

.requested {
  background: #f2f2f2;
  color: #555;
  border-radius: 10px;
  padding: 14px;
  margin-top: 16px;
  font-size: 16px;
  line-height: 1.7;
}
</style>
</head>

<body>

<h1>ご命日登録内容確認</h1>

<div id="result">
読み込み中です...
</div>

<script>
const LIFF_ID = "2010257462-MdPT50cH";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbySLP1fzdXimlOY2EvOe48rQNdnlAIF1Qvpx6f8LieN-m5jAh5PvtkfZkP0t0K7SSSL/exec";

let currentProfile = null;
let currentItems = [];

async function main() {
  try {
    await liff.init({
      liffId: LIFF_ID
    });

    currentProfile = await liff.getProfile();

    await loadList();

  } catch (error) {
  document.getElementById("result").innerHTML =
    '<div class="card">' +
    '読み込みに失敗しました。<br><br>' +
    'エラー内容：<br>' +
    escapeHtml(error.message) +
    '</div>';
}
}

async function loadList() {
  const userId = currentProfile.userId;

  const response = await fetch(
    GAS_URL +
    "?action=listDeceased&userId=" +
    encodeURIComponent(userId)
  );

  const data = await response.json();
  currentItems = data.items || [];

  if (currentItems.length === 0) {
    document.getElementById("result").innerHTML =
      '<div class="lead">' +
      '現在登録されているご命日情報はありません。' +
      '</div>';
    return;
  }

  let html =
    '<div class="lead">' +
    '登録内容を確認できます。<br><br>' +
    '通知を止めたい場合は下のボタンを押してください。<br><br>' +
'確認が終わりましたら、右上の「×」を押してLINEへお戻りください。' +
    '</div>';

  currentItems.forEach((item, index) => {
    const nextText =
      item.nextKaiki && item.nextKaikiEra
        ? `次回：${escapeHtml(item.nextKaiki)}（${escapeHtml(item.nextKaikiEra)}）`
        : `次回：${escapeHtml(item.nextKaiki || "")}`;

    html += `
      <div class="card">
        <div class="name">故 ${escapeHtml(item.deceasedName)} 様</div>

        <div class="info">
          続柄：${escapeHtml(item.relationship)}<br>
          命日：${escapeHtml(item.deathDate)}<br>
          戒名：${escapeHtml(item.posthumousName)}<br>
          ${nextText}
        </div>

        ${
          item.stopRequestStatus
            ? `<div class="requested">
                通知停止申請は既に受け付けております。<br>
                確認後、順次対応いたします。
              </div>`
            : `<button class="button" onclick="showStopConfirm(${index})">
                通知停止を申請する
              </button>`
        }
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

function showStopConfirm(index) {
  const item = currentItems[index];

  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="name">通知停止申請</div>

      <div class="info">
        故 ${escapeHtml(item.deceasedName)} 様の<br>
        通知停止を申請します。
      </div>

      <div class="notice">
        すぐには停止されません。<br>
        寺で確認してから対応します。
      </div>

      <button class="button" onclick="submitStopRequest(${index})">
        この内容で申請する
      </button>

      <button class="button cancel-button" onclick="loadList()">
        戻る
      </button>
    </div>
  `;
}

async function submitStopRequest(index) {
  const item = currentItems[index];

  document.getElementById("result").innerHTML =
    '<div class="card">申請を送信しています...</div>';

  await fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      action: "stopReminderRequest",
      userId: currentProfile.userId,
      displayName: currentProfile.displayName,
      registrantName: item.registrantName,
      deceasedName: item.deceasedName,
      deathDate: item.deathDate,
      rowNumber: item.rowNumber
    })
  });

  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="name">申請を受け付けました</div>

      <div class="info">
        故 ${escapeHtml(item.deceasedName)} 様の<br>
        通知停止申請を受け付けました。
      </div>

      <div class="notice">
        誤操作防止のため、すぐには停止されません。<br>
        内容確認後、停止処理を行います。
      </div>

<div class="notice">
  LINEへ戻る場合は、右上の「×」を押してください。
</div>

      <button class="button cancel-button" onclick="loadList()">
        一覧に戻る
      </button>
    </div>
  `;
}

function escapeHtml(text) {
  if (!text) return "";
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

main();
</script>

</body>
</html>
