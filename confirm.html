<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#f7f7f7;
  margin:0;
  padding:20px;
}

.card{
  background:white;
  border-radius:12px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1{
  font-size:28px;
}

.name{
  font-size:24px;
  font-weight:bold;
  margin-bottom:10px;
}

.info{
  line-height:1.8;
}

.button{
  display:block;
  width:100%;
  margin-top:15px;
  padding:15px;
  background:#c0392b;
  color:white;
  text-align:center;
  text-decoration:none;
  border-radius:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>ご命日登録内容確認</h1>

<div id="result">
読み込み中です...
</div>

<script>

const LIFF_ID = "2010257462-MdPT50cH";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbySLP1fzdXimlOY2EvOe48rQNdnlAIF1Qvpx6f8LieN-m5jAh5PvtkfZkP0t0K7SSSL/exec";

async function main(){

  try{

    await liff.init({
      liffId: LIFF_ID
    });

    const profile = await liff.getProfile();

    const userId = profile.userId;

    const response = await fetch(
      GAS_URL +
      "?action=listDeceased&userId=" +
      encodeURIComponent(userId)
    );

    const data = await response.json();

    if(data.items.length === 0){

      document.getElementById("result").innerHTML =
      "現在登録されているご命日情報はありません。";

      return;
    }

    let html = "";

    data.items.forEach(item => {

      html += `
      <div class="card">

        <div class="name">
          ${item.deceasedName}
        </div>

        <div class="info">
          続柄：${item.relationship}<br>
          命日：${item.deathDate}<br>
          戒名：${item.posthumousName}<br>
          次回年回忌：${item.nextKaiki}
        </div>

        <a class="button">
          通知停止を申請
        </a>

      </div>
      `;
    });

    document.getElementById("result").innerHTML = html;

  }
  catch(error){

    document.getElementById("result").innerHTML =
      "読み込みに失敗しました。";
  }

}

main();

</script>

</body>
</html>
