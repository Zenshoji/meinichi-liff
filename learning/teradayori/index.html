<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>寺だより｜禅昌寺</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #f7f6f2;
      color: #333333;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Kaku Gothic ProN",
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      line-height: 1.8;
    }

    .container {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .close-guide {
      margin-bottom: 24px;
      padding: 12px 14px;
      background-color: #ffffff;
      border-radius: 8px;
      text-align: center;
      font-size: 0.95rem;
      color: #555555;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #5f6f52;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
    }

    .page-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .page-header h1 {
      margin: 0 0 10px;
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .page-header p {
      margin: 0;
      font-size: 1rem;
      color: #666666;
    }

    .notice {
      padding: 24px 20px;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    .notice h2 {
      margin: 0 0 12px;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .notice p {
      margin: 0;
      font-size: 1rem;
      color: #555555;
    }

    footer {
      margin-top: 36px;
      text-align: center;
      font-size: 0.9rem;
      color: #777777;
    }

    @media (max-width: 480px) {
      .container {
        padding-left: 14px;
        padding-right: 14px;
      }

      .page-header h1 {
        font-size: 1.5rem;
      }

      .notice {
        padding: 22px 18px;
      }
    }
  </style>
</head>

<body>

  <main class="container">

    <div class="close-guide">
      LINEへ戻るには、右上の「×」を押してください
    </div>

    <a href="../" class="back-link">
      ← 学びトップへ戻る
    </a>

    <header class="page-header">
      <h1>寺だより</h1>
      <p>
        寺だよりをご覧いただけます。
      </p>
    </header>

    <div class="notice">
      <h2>ただいま準備中です</h2>
      <p>
        公開までしばらくお待ちください。
      </p>
    </div>

    <footer>
      曹洞宗 禅昌寺
    </footer>

  </main>

</body>
</html>
